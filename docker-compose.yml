version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deokhugam-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d deokhugam" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - deokhugam-network

  app:
    build: .
    container_name: deokhugam-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      SPACE_OCR_API_KEY: ${SPACE_OCR_API_KEY}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CLOUD_AWS_REGION_STATIC: ${AWS_REGION}
      CLOUD_AWS_S3_BUCKET: ${AWS_BUCKET_NAME}

      JVM_OPTS: ""
    networks:
      - deokhugam-network

networks:
  deokhugam-network:
    driver: bridge

volumes:
  pgdata:
