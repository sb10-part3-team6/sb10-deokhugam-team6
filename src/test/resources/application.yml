spring:
  test:
    database:
      replace: none

  datasource:
    url: jdbc:h2:mem:${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true

  batch:
    job:
      enabled: false

cloud:
  aws:
    s3:
      region: ap-northeast-2
      bucket: test-bucket

naverapi:
  client-id: test-client-id
  client-secret: test-client-secret

ocr:
  url: http://127.0.0.1:0
  apikey: test-api-key
